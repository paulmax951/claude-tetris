<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="top-bar">
      <h1 class="game-title">TETRIS</h1>

      <div class="theme-toggle-wrap">
        <span class="theme-toggle-label" id="theme-toggle-label">DARK</span>
        <label class="switch">
          <input type="checkbox" id="theme-toggle" aria-label="Cambiar entre modo oscuro y claro" />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>

    <div id="pause-menu" class="overlay hidden">
      <div class="overlay-box pause-menu-box">
        <p class="pause-menu-title">PAUSA</p>

        <div id="pause-main-view">
          <button id="resume-btn" class="menu-btn">Reanudar</button>
          <button id="pause-restart-btn" class="menu-btn">Reiniciar</button>
          <button id="show-controls-btn" class="menu-btn">Ver controles</button>

          <div class="start-level-picker">
            <span class="label">NIVEL INICIAL</span>
            <div class="level-stepper">
              <button id="level-down-btn" type="button" aria-label="Bajar nivel inicial">&minus;</button>
              <span id="start-level-value" class="value">1</span>
              <button id="level-up-btn" type="button" aria-label="Subir nivel inicial">+</button>
            </div>
          </div>
        </div>

        <div id="pause-controls-view" class="hidden">
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
          </ul>
          <button id="back-to-menu-btn" class="menu-btn">Volver</button>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
