<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="top-bar">
      <h1 class="game-title">TETRIS</h1>

      <div class="theme-toggle-wrap">
        <span class="theme-toggle-label" id="theme-toggle-label">DARK</span>
        <label class="switch">
          <input type="checkbox" id="theme-toggle" aria-label="Cambiar entre modo oscuro y claro" />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">COMBO</span>
          <span class="value" id="combo">0</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>

        <div id="highscore-entry" class="hidden">
          <input id="player-name-input" type="text" maxlength="10" placeholder="Tu nombre" aria-label="Nombre del jugador" />
          <button id="save-score-btn">Guardar</button>
        </div>

        <div id="overlay-highscores-section" class="highscores-section hidden">
          <span class="label">RÉCORDS</span>
          <ol id="overlay-highscores" class="highscores-list"></ol>
          <p id="overlay-stats" class="stats-line"></p>
        </div>

        <button id="restart-btn">Reiniciar</button>
        <button id="reset-scores-btn">Reiniciar récords</button>
      </div>
    </div>

    <div id="start-overlay" class="overlay">
      <div class="overlay-box">
        <p id="start-title">TETRIS</p>

        <div class="highscores-section">
          <span class="label">RÉCORDS</span>
          <ol id="start-highscores" class="highscores-list"></ol>
          <p id="start-stats" class="stats-line"></p>
        </div>

        <button id="start-btn">Jugar</button>
        <button id="reset-scores-btn-start">Reiniciar récords</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
